* { margin: 0; padding: 0; box-sizing: border-box; }

/* CRITICAL FIX: Canvas containers must have fixed max-height */
.chart-container { position: relative; height: 280px; max-height: 280px; width: 100%; }

.chart-container-sm { position: relative; height: 200px; max-height: 200px; width: 100%; }

.fade-in { animation: fadeIn 0.3s ease; }

.gauge-circle { transition: stroke-dashoffset 0.6s ease-out; }
.pulse-dot { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.nav-item { border-right: 3px solid transparent; transition: all 0.15s ease; }
.nav-item.active { background: rgba(212,165,116,0.12); border-right-color: var(--accent-gold); }
.nav-item:hover:not(.active) { background: rgba(42,58,92,0.5); }
.expanded-detail { animation: expandRow 0.25s ease; }
@keyframes expandRow { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 500px; } }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
table { border-collapse: collapse; width: 100%; }
th, td { white-space: nowrap; }

  const currentPrice = r.price;
  const quantity = Math.floor(50000 / buyPrice);
  const pnl = (currentPrice - buyPrice) * quantity;
  const pnlPct = ((currentPrice - buyPrice) / buyPrice) * 100;

    name: r.name,
    buyPrice: Math.round(buyPrice * 100) / 100,
    currentPrice: currentPrice,

function scoreColor(score) {
  if (score >= 1.5) return 'text-[#e74c3c] bg-[#e74c3c]/10';
  if (score >= 1.2) return 'text-[#d4a574] bg-[#d4a574]/10';
  if (score >= 1.0) return 'text-[#e6ddd0] bg-[#e6ddd0]/10';
  return 'text-[#95a5a6] bg-[#95a5a6]/10';
}
function rankBadge(rank) {
  if (rank === 1) return 'bg-[#d4a574]/20 text-[#d4a574]';
  if (rank === 2) return 'bg-[#95a5a6]/20 text-[#95a5a6]';
  if (rank === 3) return 'bg-[#b8894a]/20 text-[#b8894a]';
  return 'text-[#95a5a6]';
}
function fmtMoney(v) { return '¥' + (v >= 0 ? '' : '-') + '¥' + Math.abs(v).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
function card(icon, title, value, colorClass) {
  return `<div class="rounded-xl p-4 flex items-center gap-3" style="background: var(--bg-card); border: 1px solid var(--border);">
    <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background: rgba(42,58,92,0.5);"><i class="${icon}" style="color: var(--accent-gold);"></i></div>
    <div><div class="text-xs mb-0.5" style="color: var(--text-secondary);">${title}</div><div class="text-lg font-bold font-mono ${colorClass}">${value}</div></div>
  </div>`;
}

              <th class="px-3 py-2.5 text-xs font-medium text-right" style="color: var(--text-secondary);">现价</th>

                const c = p.pnl >= 0 ? 'text-[#e74c3c]' : 'text-[#2ecc71]';
                const isConfirm = sellConfirmCode === p.code;
                return `<tr class="hover:bg-[#1e2a4a]/60 transition-colors" style="border-bottom: 1px solid rgba(42,58,92,0.3);">
                  <td class="px-3 py-2.5 font-mono text-xs" style="color: var(--text-primary);">${p.code}</td>
                  <td class="px-3 py-2.5 text-sm font-medium" style="color: var(--text-primary);">${p.name}</td>

                  <td class="px-3 py-2.5 text-right font-mono text-sm ${c}">${p.pnl >= 0 ? '+' : ''}¥${p.pnl.toFixed(0)}</td>
                  <td class="px-3 py-2.5 text-right font-mono text-sm ${c}">${p.pnlPct >= 0 ? '+' : ''}${p.pnlPct.toFixed(2)}%</td>

                </tr>`;
              }).join('')}

      <div class="rounded-xl p-4" style="background: var(--bg-card); border: 1px solid var(--border);">

            const pct = Math.min(Math.abs(p.pnl) / 5000 * 100, 100);

            return `<div class="flex items-center gap-3"><span class="text-xs w-20 truncate" style="color: var(--text-secondary);">${p.name}</span><div class="flex-1 h-3 rounded-full overflow-hidden" style="background: rgba(42,58,92,0.4);"><div class="h-full rounded-full" style="width: ${pct}%; background: ${color};"></div></div><span class="text-xs font-mono w-16 text-right" style="color: ${color};">${p.pnl >= 0 ? '+' : ''}¥${p.pnl.toFixed(0)}</span></div>`;

function handleSell(code) {
  if (sellConfirmCode === code) { sellConfirmCode = null; alert('模拟卖出: ' + code); }
  else { sellConfirmCode = code; setTimeout(() => { if (sellConfirmCode === code) { sellConfirmCode = null; refreshPage(); } }, 3000); refreshPage(); }
}

        <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" class="gauge-circle"/>
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-lg font-bold font-mono" style="color: ${color};">${value}${unit}</span></div>
    </div>
    <span class="text-xs mt-2" style="color: var(--text-secondary);">${label}</span>

function runBacktest() {
  document.getElementById('backtestResults').classList.remove('hidden');

      const data = [100]; for (let i = 1; i < 120; i++) data.push(data[i-1] * (1 + (Math.random() * 0.05 - 0.018)));
      new Chart(ctx, { type: 'line', data: { labels, datasets: [{ data, borderColor: '#d4a574', backgroundColor: 'rgba(212,165,116,0.08)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2 }] },

    }
  }, 100);
}

function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(el => { el.classList.remove('active'); el.style.color = 'var(--text-secondary)'; el.style.borderRightColor = 'transparent'; });
  const nav = document.getElementById('nav-' + page);
  if (nav) { nav.classList.add('active'); nav.style.color = 'var(--accent-gold)'; }
  document.getElementById('pageTitle').textContent = pageTitles[page] || 'AQuant';
  const container = document.getElementById('pageContainer');
  container.innerHTML = pageRenderers[page] ? pageRenderers[page]() : '';
  // Destroy old charts before creating new ones
  Chart.getChart?.("equityChart")?.destroy();
  Chart.getChart?.("dailyReturnChart")?.destroy();
  Chart.getChart?.("gpuUtilChart")?.destroy();
  Chart.getChart?.("gpuTempChart")?.destroy();
  Chart.getChart?.("backtestEquityChart")?.destroy();
  if (page === 'performance') setTimeout(initPerformanceCharts, 50);
  if (page === 'gpu') setTimeout(initGpuCharts, 50);
}
function refreshPage() { const current = document.querySelector('.nav-item.active')?.id.replace('nav-', '') || 'recommend'; showPage(current); }

showPage('recommend');
